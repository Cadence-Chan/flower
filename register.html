  <h1><i>🌸Customer Registration🌸</i></h1>


 
  <form method="post" action="">
    <h2>Create Your Account</h2>

    Full Name:<br>
    <input type="text" name="fullname" placeholder="Enter your full name" required><br><br>

    Email Address:<br>
    <input type="email" name="email" placeholder="Enter your email" required><br><br>

    Password:<br>
    <input type="password" name="password" placeholder="Enter password" required><br><br>

    Confirm Password:<br>
    <input type="password" name="confirm_password" placeholder="Re-enter password" required><br><br>

    Phone Number:<br>
    <input type="tel" name="phone" placeholder="Enter phone number"><br><br>

    Delivery Address:<br>
    <textarea name="address" rows="3" cols="30" placeholder="Enter your address"></textarea><br><br>

    <input type="submit" name="register" value="Register">
    <input type="reset" value="Clear">
  </form>
